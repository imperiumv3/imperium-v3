# -----------------------------------------------------------------------------
# Imperium — docker-compose for self-hosted deployments.
#
# Usage:
#   1. cp .env.example .env  &&  edit values
#   2. docker compose up --build
#   3. open http://localhost:3000
#
# This compose file runs the app only. Bring your own Supabase project
# (hosted at supabase.com or self-hosted separately). See docs/INSTALLATION.md.
# -----------------------------------------------------------------------------

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: imperium:latest
    container_name: imperium-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
